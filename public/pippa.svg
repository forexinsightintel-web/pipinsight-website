<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0C1B2E"/><stop offset="1" stop-color="#1B3A55"/>
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="56" fill="url(#bg)" stroke="#1AAF8B" stroke-width="4"/>
  <!-- antenna -->
  <line x1="60" y1="14" x2="60" y2="26" stroke="#D4A017" stroke-width="4" stroke-linecap="round"/>
  <circle cx="60" cy="11" r="5" fill="#D4A017"/>
  <!-- visor -->
  <rect x="26" y="38" width="68" height="34" rx="17" fill="#0B1220" stroke="#38BDF8" stroke-width="2.5"/>
  <!-- candlestick eyes -->
  <line x1="45" y1="42" x2="45" y2="68" stroke="#1AAF8B" stroke-width="2"/>
  <rect x="41" y="48" width="8" height="12" rx="2" fill="#1AAF8B"/>
  <line x1="75" y1="42" x2="75" y2="68" stroke="#EF4444" stroke-width="2"/>
  <rect x="71" y="50" width="8" height="12" rx="2" fill="#EF4444"/>
  <!-- smile -->
  <path d="M44 84 Q60 96 76 84" fill="none" stroke="#38BDF8" stroke-width="4" stroke-linecap="round"/>
  <!-- ear bolts -->
  <circle cx="20" cy="55" r="5" fill="#1AAF8B"/><circle cx="100" cy="55" r="5" fill="#1AAF8B"/>
</svg>
